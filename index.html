<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>គ្រប់គ្រងភារកិច្ច - មុខងារពេញលេញ</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333333;
            --input-bg: #ffffff;
            --border-color: #dddddd;
            --item-bg: #ffffff;
            --low-color: #28a745;
            --med-color: #fd7e14;
            --high-color: #dc3545;
        }

        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #f4f4f4;
            --input-bg: #2d2d2d;
            --border-color: #444444;
            --item-bg: #2d2d2d;
        }

        body {
            font-family: 'Khmer OS Battambang', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding-top: 30px;
            padding-bottom: 50px;
            transition: all 0.3s ease;
        }

        .container {
            background: var(--container-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .search-group { margin-bottom: 15px; }
        .search-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #5c67f2;
            border-radius: 8px;
            box-sizing: border-box;
            background: var(--input-bg);
            color: var(--text-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(92, 103, 242, 0.08);
            border-radius: 10px;
        }

        .input-row { display: flex; gap: 10px; }
        input, select {
            padding: 10px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            border-radius: 6px;
            font-family: 'Khmer OS Battambang';
        }

        .date-label { font-size: 0.85rem; margin-bottom: -5px; font-weight: bold; }
        input[type="datetime-local"] { width: 100%; box-sizing: border-box; }

        input[type="text"] { flex: 2; }
        select { flex: 1; cursor: pointer; }

        button.main-btn {
            padding: 10px 15px;
            background-color: #5c67f2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Khmer OS Battambang';
        }

        ul { list-style: none; padding: 0; }

        li {
            background: var(--item-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .task-info { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }
        .task-main { display: flex; align-items: center; gap: 10px; }
        
        .priority-badge {
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
        }

        .task-date { font-size: 0.75rem; color: #777; margin-left: 35px; }
        .p-low { background-color: var(--low-color); }
        .p-med { background-color: var(--med-color); }
        .p-high { background-color: var(--high-color); }

        .task-text { cursor: pointer; font-weight: 500; }
        .completed { text-decoration: line-through; opacity: 0.4; }

        .delete-btn { background: #ff5e5e; padding: 5px 10px; font-size: 11px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .clear-btn { margin-top: 20px; width: 100%; background-color: #dc3545; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Khmer OS Battambang'; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>តារាងភារកិច្ច</h1>
            <div class="controls">
                <button class="icon-btn" id="soundToggle" onclick="toggleSound()">🔊 បើកសំឡេង</button>
                <button class="icon-btn" id="themeToggle" onclick="toggleTheme()">🌙 ងងឹត</button>
            </div>
        </div>

        <div class="search-group">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 ស្វែងរកភារកិច្ច..." onkeyup="filterTasks()">
        </div>

        <div class="input-group">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="ឈ្មោះភារកិច្ច...">
                <select id="priorityInput">
                    <option value="low">ទាប</option>
                    <option value="med" selected>មធ្យម</option>
                    <option value="high">ខ្ពស់</option>
                </select>
            </div>
            <div class="date-label">កាលបរិច្ឆេទត្រូវបញ្ចប់៖</div>
            <input type="datetime-local" id="dateInput">
            <button class="main-btn" onclick="addTask()">បន្ថែមភារកិច្ច</button>
        </div>
        
        <ul id="taskList"></ul>
        <button class="clear-btn" onclick="clearAll()">លុបភារកិច្ចទាំងអស់</button>
    </div>

    <script>
        let isSoundEnabled = true;

        document.addEventListener('DOMContentLoaded', () => {
            getTasks();
            loadTheme();
        });

        const priorityMap = { 'low': 'ទាប', 'med': 'មធ្យម', 'high': 'ខ្ពស់' };

        // --- មុខងារបង្កើតសំឡេង (Web Audio API) ---
        function playSound(action) {
            if (!isSoundEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (action === 'add') {
                    // សំឡេងខ្ពស់ពេលបន្ថែម
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                } else if (action === 'delete') {
                    // សំឡេងទាបពេលលុប
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.15);
                } else if (action === 'complete') {
                    // សំឡេងពីរោះពេលធីករួចរាល់
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.15);
                }
            } catch (e) {
                console.log("Browser មិនគាំទ្រការបង្កើតសំឡេងទេ។");
            }
        }

        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            document.getElementById('soundToggle').innerText = isSoundEnabled ? "🔊 បើកសំឡេង" : "🔇 បិទសំឡេង";
        }

        // --- មុខងារស្វែងរក និងគ្រប់គ្រងភារកិច្ច ---
        function filterTasks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#taskList li').forEach(task => {
                const text = task.querySelector('.task-text').innerText.toLowerCase();
                task.style.display = text.includes(query) ? "flex" : "none";
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('priorityInput');
            const dateInput = document.getElementById('dateInput');
            
            if (input.value.trim() === "") return;

            const taskObj = { 
                text: input.value.trim(), 
                completed: false,
                priority: priority.value,
                dueDate: dateInput.value 
            };

            createListElement(taskObj);
            saveLocalTask(taskObj);
            playSound('add'); // ចាក់សំឡេងពេលបន្ថែម
            
            input.value = "";
            dateInput.value = "";
        }

        function createListElement(taskObj) {
            const taskList = document.getElementById('taskList');
            const li = document.createElement('li');
            li.dataset.dueDate = taskObj.dueDate; // រក្សាទុកកាលបរិច្ឆេទក្នុង DOM
            
            let formattedDate = "";
            if (taskObj.dueDate) {
                const d = new Date(taskObj.dueDate);
                formattedDate = `📅 ${d.toLocaleDateString('km-KH')} ម៉ោង ${d.toLocaleTimeString('km-KH', {hour: '2-digit', minute:'2-digit'})}`;
            }

            li.innerHTML = `
                <div class="task-info">
                    <div class="task-main">
                        <span class="priority-badge p-${taskObj.priority}">${priorityMap[taskObj.priority]}</span>
                        <span class="task-text ${taskObj.completed ? 'completed' : ''}" onclick="toggleTask(this)">
                            ${taskObj.text}
                        </span>
                    </div>
                    ${formattedDate ? `<span class="task-date">${formattedDate}</span>` : ''}
                </div>
                <button class="delete-btn" onclick="deleteTask(this)">លុប</button>
            `;
            taskList.appendChild(li);
        }

        function toggleTask(element) {
            element.classList.toggle('completed');
            if (element.classList.contains('completed')) {
                playSound('complete'); // ចាក់សំឡេងពេលធីកចប់
            }
            updateLocalStorage();
        }

        function deleteTask(element) {
            element.closest('li').remove();
            playSound('delete'); // ចាក់សំឡេងពេលលុប
            updateLocalStorage();
        }

        function clearAll() {
            if (confirm("លុបទាំងអស់?")) {
                document.getElementById('taskList').innerHTML = "";
                localStorage.removeItem('tasks');
                playSound('delete');
            }
        }

        // --- មុខងារផ្សេងៗ (Theme & Storage) ---
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').innerText = isDark ? "☀️ ពន្លឺ" : "🌙 ងងឹត";
        }

        function loadTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').innerText = "☀️ ពន្លឺ";
            }
        }

        function saveLocalTask(task) {
            let tasks = localStorage.getItem('tasks') ? JSON.parse(localStorage.getItem('tasks')) : [];
            tasks.push(task);
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function updateLocalStorage() {
            let tasks = [];
            document.querySelectorAll('#taskList li').forEach(li => {
                const priorityClass = li.querySelector('.priority-badge').classList[1];
                tasks.push({
                    text: li.querySelector('.task-text').innerText,
                    completed: li.querySelector('.task-text').classList.contains('completed'),
                    priority: priorityClass.split('-')[1],
                    dueDate: li.dataset.dueDate || "" 
                });
            });
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function getTasks() {
            let tasks = localStorage.getItem('tasks') ? JSON.parse(localStorage.getItem('tasks')) : [];
            tasks.forEach(task => createListElement(task));
        }
    </script>
</body>
</html>
